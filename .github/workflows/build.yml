name: Build APK
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with official Kivy Docker image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            sh -c "cd /home/user/hostcwd && \
                   yes | sdkmanager --licenses && \
                   sdkmanager 'build-tools;33.0.0' && \
                   buildozer android debug"

      - name: Verify APK
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK produced"
            exit 1
          fi
          echo "Found APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BuddyAssistant-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
