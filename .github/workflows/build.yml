name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip build-essential git libffi-dev libssl-dev autoconf libtool pkg-config

      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.33 kivy

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Buddy Assistant
          package.name = buddyassistant
          package.domain = org.buddy
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy,speechrecognition
          orientation = portrait
          android.permissions = INTERNET,RECORD_AUDIO,MODIFY_AUDIO_SETTINGS
          android.api = 31
          android.minapi = 21
          android.accept_sdk_license = True
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK
        run: yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BuddyAssistant-APK
          path: bin/*.apk
