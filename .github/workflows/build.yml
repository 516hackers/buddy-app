name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip build-essential git \
            libffi-dev libssl-dev autoconf \
            libtool pkg-config cmake \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libreadline-dev \
            libsqlite3-dev libgdbm-dev \
            libdb5.3-dev libbz2-dev libexpat1-dev \
            liblzma-dev tk-dev libxml2-dev \
            libxmlsec1-dev libffi-dev liblzma-dev \
            wget curl

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer
          pip install jinja2

      - name: Configure Buildozer
        run: |
          # Create .buildozer directory
          mkdir -p ~/.buildozer
          
          # Accept Android SDK licenses
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          
          # Create default buildozer spec if not exists
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Build with Buildozer
        run: |
          # Build debug APK
          buildozer -v android debug
          
          # If debug build fails, try with clean
          if [ $? -ne 0 ]; then
            echo "Debug build failed, trying clean build..."
            buildozer android clean
            buildozer -v android debug
          fi

      - name: List built files
        run: |
          echo "Listing bin directory:"
          ls -la bin/ || echo "bin directory not found"
          
          echo "Listing current directory:"
          ls -la

      - name: Upload APK - arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: BuddyAssistant-arm64-v8a
          path: bin/*arm64-v8a*.apk
          if-no-files-found: warn

      - name: Upload APK - armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: BuddyAssistant-armeabi-v7a
          path: bin/*armeabi-v7a*.apk
          if-no-files-found: warn

      - name: Upload APK - universal
        uses: actions/upload-artifact@v4
        with:
          name: BuddyAssistant-universal
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build logs (if build failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            .buildozer/logs/
            buildozer.log
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: |
          # Clean up to free space
          rm -rf .buildozer/.cache
          rm -rf ~/.ccache
